<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i-CID | Photo Ka Kachcha Chittha</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for Hacker/Terminal Look -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RZ70BC6S32"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RZ70BC6S32');
    </script>

    <style>
        body {
            background-color: #050505;
            color: #00ff41; /* Hacker Green */
            font-family: 'Fira Code', monospace;
            background-image: radial-gradient(circle, #001100 10%, #050505 80%);
        }
        .terminal-border {
            border: 1px solid #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .glow-text {
            text-shadow: 0 0 5px #00ff41;
        }
        /* Scanner Line Animation for Drop Zone */
        .scan-line {
            width: 100%;
            height: 2px;
            background-color: #00ff41;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 10px #00ff41;
            animation: scan 2s infinite linear;
            display: none;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        /* Typewriter Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #00ff41;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <!-- Header Section -->
    <header class="text-center mb-8 w-full max-w-3xl">
        <h1 class="text-4xl md:text-5xl font-bold tracking-widest glow-text mb-2 font-['Share_Tech_Mono']">
            <i class="fa-solid fa-user-secret"></i> i-CID
        </h1>
        <p class="text-sm md:text-base text-green-600">
            [SYSTEM DETECTED] // अपनी फोटो डालो, अपना मज़ाक उड़वाओ
        </p>
    </header>

    <main class="w-full max-w-3xl flex flex-col gap-6">
        
        <!-- THE DROP ZONE (Upload Area) -->
        <div id="dropZone" class="relative w-full h-48 terminal-border rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-green-900/20 transition group overflow-hidden">
            <div class="scan-line" id="scanLine"></div>
            <i class="fa-solid fa-camera text-4xl mb-3 group-hover:scale-110 transition"></i>
            <p class="text-lg font-bold">CLICK TO UPLOAD / DROP IMAGE</p>
            <p class="text-xs text-green-800 mt-2">NO VIDEO. NO B.S. MAX 5MB.</p>
            <input type="file" id="imageInput" class="hidden" accept="image/*">
            <img id="imagePreview" class="absolute inset-0 w-full h-full object-contain hidden bg-black/80 backdrop-blur-sm" alt="Preview">
        </div>

        <!-- THE 7 MAGIC BUTTONS (Hidden until image uploads) -->
        <div id="actionButtons" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            <!-- Button 1 -->
            <button class="terminal-border p-3 text-left hover:bg-green-900/40 transition flex flex-col gap-1" data-action="drip">
                <span class="font-bold text-white"><i class="fa-solid fa-shirt"></i> Drip Check (ब्रांड & रेट)</span>
                <span class="text-xs text-green-600">असली माल है या सरोजिनी का जुगाड़? ब्रांड और अंदाज़न कीमत।</span>
            </button>
            <!-- Button 2 -->
            <button class="terminal-border p-3 text-left hover:bg-green-900/40 transition flex flex-col gap-1" data-action="vibe">
                <span class="font-bold text-white"><i class="fa-solid fa-sparkles"></i> Vibe Check (कैसा टाइप है?)</span>
                <span class="text-xs text-green-600">पहाड़ या कैफे? इसका म्यूजिक टेस्ट और पर्सनैलिटी गेस।</span>
            </button>
            <!-- Button 3 -->
            <button class="terminal-border p-3 text-left hover:bg-green-900/40 transition flex flex-col gap-1 border-red-500 text-red-500" data-action="roast">
                <span class="font-bold text-white"><i class="fa-solid fa-fire"></i> Roast मारो (मीम बनाओ)</span>
                <span class="text-xs text-red-800">भयंकर बेइज्जती और कड़क WhatsApp मीम कैप्शन।</span>
            </button>
            <!-- Button 4 -->
            <button class="terminal-border p-3 text-left hover:bg-green-900/40 transition flex flex-col gap-1" data-action="fake">
                <span class="font-bold text-white"><i class="fa-solid fa-magnifying-glass-chart"></i> असली या Fake? (पोल खोल)</span>
                <span class="text-xs text-green-600">भारी फिल्टर, AI जनरेटेड या कोई स्कैम स्क्रीनशॉट?</span>
            </button>
            <!-- Button 5 -->
            <button class="terminal-border p-3 text-left hover:bg-green-900/40 transition flex flex-col gap-1" data-action="location">
                <span class="font-bold text-white"><i class="fa-solid fa-earth-asia"></i> लोकेशन जासूस (कहाँ की है?)</span>
                <span class="text-xs text-green-600">पीछे के पेड़/बिल्डिंग देखकर राज्य या शहर का अंदाज़ा।</span>
            </button>
            <!-- Button 6 -->
            <button class="terminal-border p-3 text-left hover:bg-green-900/40 transition flex flex-col gap-1 border-yellow-500 text-yellow-500" data-action="utility">
                <span class="font-bold text-white"><i class="fa-solid fa-screwdriver-wrench"></i> काम की बात (नंबर / सॉल्वर)</span>
                <span class="text-xs text-yellow-700">गाड़ी की नंबर प्लेट, मैथ का सवाल या मोबाइल का एरर फिक्स।</span>
            </button>
            <!-- Button 7 (Master Button) -->
            <button class="terminal-border p-3 text-center hover:bg-green-900/40 transition flex flex-col gap-1 md:col-span-2 border-white text-white" data-action="deepscan">
                <span class="font-bold text-lg"><i class="fa-solid fa-user-ninja"></i> पूरा कच्चा चिट्ठा (Deep Scan)</span>
                <span class="text-xs text-gray-400">फोटो का पूरा एक्स-रे, A to Z सारी कुंडली एक पैराग्राफ में।</span>
            </button>
        </div>

        <!-- FBI TERMINAL LOADING STATE -->
        <div id="loadingTerminal" class="terminal-border p-4 h-40 hidden flex-col justify-end bg-black font-['Share_Tech_Mono'] text-sm">
            <div id="terminalText" class="text-green-500"></div>
            <div>> <span class="cursor"></span></div>
        </div>

        <!-- 📦 RESULT UI (The 4 Boxes) -->
        <div id="resultContainer" class="hidden flex flex-col gap-4">
            
            <!-- Box 1: Profile & Status -->
            <div class="terminal-border p-4 flex items-center gap-4 bg-green-950/20">
                <div class="w-16 h-16 rounded-full border-2 border-green-500 overflow-hidden shrink-0">
                    <img id="resultThumb" src="" alt="thumb" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <span class="text-xs text-green-700">TARGET ACQUIRED</span>
                    <span class="font-bold text-white glow-text" id="statusHeader">STATUS: SCANNED</span>
                </div>
            </div>

            <!-- Box 2: The Core Intel (Typewriter Box) -->
            <div class="terminal-border p-4 bg-black min-h-[100px] relative">
                <p id="coreIntelText" class="whitespace-pre-line leading-relaxed text-gray-200"></p>
                <span id="intelCursor" class="cursor hidden"></span>
            </div>

            <!-- Box 3: Quick Tags & Extra Links (Lab Link goes here!) -->
            <div id="quickTags" class="flex flex-wrap gap-2 text-xs">
                <!-- Data will be injected via JS -->
            </div>

            <!-- Box 4: Share / Viral Box -->
            <button id="generateOGBtn" class="terminal-border p-3 bg-green-800 text-black font-bold hover:bg-green-600 transition flex justify-center items-center gap-2">
                <i class="fa-brands fa-whatsapp text-xl"></i> RESULT को WhatsApp पर पेलें 
            </button>
            <p class="text-center text-[10px] text-green-900 mt-1">Images are processed & deleted. We respect privacy.</p>
        </div>

    </main>

    <!-- AdSense Space for Loading Time -->
    <div id="adSpace" class="mt-8 w-full max-w-3xl text-center hidden">
        <p class="text-xs text-green-900 mb-2">[ COMMUNICATING WITH SECURE SATELLITE... ]</p>
        <!-- AdSense Code will go here -->
    </div>

</body>
</html>
